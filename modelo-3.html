  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

      setStatus('Error: missing bundle data');

      return;

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const reader = ds.readable.getReader();

            writer.close();

            while (true) {

              chunks.push(value);

            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.

      template = template.slice(0, i) + resourceScript + template.slice(i);

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

        s.textContent = await r.text();
        s.removeAttribute('src');

      old.replaceWith(s);

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

" id=\"burger\" aria-label=\"Menu\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"mobile-menu\" id=\"mobileMenu\">\n  <a href=\"#score\">O Score<\u002Fa>\n  <a href=\"#dimensoes\">Dimensões<\u002Fa>\n  <a href=\"#servicos\">Serviços<\u002Fa>\n  <a href=\"#metodo\">Método<\u002Fa>\n  <a href=\"#contato\">Contato<\u002Fa>\n<\u002Fdiv>\n\n<!-- HERO -->\n<section class=\"hero\" id=\"top\">\n  <div class=\"grid-lines\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"hero-kick\">\n      <span class=\"idx\">01 — METODOLOGIA RDS<\u002Fspan>\n      <span class=\"mono\">Diagnóstico de carteira contratual<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"hero-grid\">\n      <div>\n        <h1 class=\"display rv\">A carteira<br>inteira em<br>um <span class=\"b\">número.<\u002Fspan><\u002Fh1>\n        <p class=\"sub rv d1\">O <b>RDS Score<\u002Fb> traduz a saúde da carteira contratual de uma empresa de infraestrutura em uma nota de <b>0 a 10<\u002Fb> — comparável, acionável e sustentada por uma leitura técnica e independente.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"spec rv d2\">\n        <div class=\"row\"><span class=\"k\">Escala<\u002Fspan><span class=\"v\">0 – 10<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"k\">Dimensões<\u002Fspan><span class=\"v\">05 frentes<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"k\">Peso máx.<\u002Fspan><span class=\"v\">Resultado &amp; margem<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"k\">Leitura<\u002Fspan><span class=\"v\">Externa · independente<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"k\">Atualização<\u002Fspan><span class=\"v\">Periódica<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-foot\">\n      <span class=\"mono\">RDS Score · v.2026 · valores ilustrativos<\u002Fspan>\n      <a class=\"scrollcue\" href=\"#score\">Simular agora <span class=\"ar\">↓<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SIMULATOR -->\n<section class=\"sim sec\" id=\"score\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"l\">\n        <span class=\"idx\">02 — SIMULADOR<\u002Fspan>\n        <h2>Mexa nas dimensões. A nota responde.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"r\">Um modelo interativo de como o RDS Score se comporta. Ajuste cada frente e veja a nota — e a faixa de leitura — se recalcularem ao vivo.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"sim-grid\">\n      <!-- GAUGE -->\n      <div>\n        <div class=\"gauge\">\n          <svg viewBox=\"0 0 260 260\" aria-hidden=\"true\">\n            <circle class=\"track\" cx=\"130\" cy=\"130\" r=\"116\" fill=\"none\" stroke-width=\"6\"><\u002Fcircle>\n            <circle class=\"prog\" id=\"progArc\" cx=\"130\" cy=\"130\" r=\"116\" fill=\"none\" stroke-width=\"6\" stroke-dasharray=\"729\" stroke-dashoffset=\"729\"><\u002Fcircle>\n          <\u002Fsvg>\n          <div class=\"gauge-c\">\n            <div class=\"num\"><span id=\"scoreNum\">0.0<\u002Fspan><span class=\"den\">/10<\u002Fspan><\u002Fdiv>\n            <div class=\"band\" id=\"bandLabel\">—<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"scale-bar\"><i class=\"s0\"><\u002Fi><i class=\"s1\"><\u002Fi><i class=\"s2\"><\u002Fi><\u002Fdiv>\n        <div class=\"scale-labels\"><span>0 · CRÍTICO<\u002Fspan><span>5 · ATENÇÃO<\u002Fspan><span>10 · SÓLIDA<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- CONTROLS -->\n      <div>\n        <div class=\"controls\" id=\"controls\">\n          <div class=\"ctrl\">\n            <div class=\"ctrl-top\"><span class=\"name\">Resultado e margem <span class=\"w\">peso 30%<\u002Fspan><\u002Fspan><span class=\"val\" data-val=\"d1\">7.0<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" id=\"d1\" min=\"0\" max=\"10\" step=\"0.5\" value=\"7\">\n          <\u002Fdiv>\n          <div class=\"ctrl\">\n            <div class=\"ctrl-top\"><span class=\"name\">Risco contratual <span class=\"w\">peso 25%<\u002Fspan><\u002Fspan><span class=\"val\" data-val=\"d2\">6.0<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" id=\"d2\" min=\"0\" max=\"10\" step=\"0.5\" value=\"6\">\n          <\u002Fdiv>\n          <div class=\"ctrl\">\n            <div class=\"ctrl-top\"><span class=\"name\">Prazo e execução <span class=\"w\">peso 20%<\u002Fspan><\u002Fspan><span class=\"val\" data-val=\"d3\">7.0<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" id=\"d3\" min=\"0\" max=\"10\" step=\"0.5\" value=\"7\">\n          <\u002Fdiv>\n          <div class=\"ctrl\">\n            <div class=\"ctrl-top\"><span class=\"name\">Conformidade <span class=\"w\">peso 15%<\u002Fspan><\u002Fspan><span class=\"val\" data-val=\"d4\">8.0<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" id=\"d4\" min=\"0\" max=\"10\" step=\"0.5\" value=\"8\">\n          <\u002Fdiv>\n          <div class=\"ctrl\">\n            <div class=\"ctrl-top\"><span class=\"name\">Concentração e dependência <span class=\"w\">peso 10%<\u002Fspan><\u002Fspan><span class=\"val\" data-val=\"d5\">6.0<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" id=\"d5\" min=\"0\" max=\"10\" step=\"0.5\" value=\"6\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"presets\">\n          <span class=\"pl\">Cenários:<\u002Fspan>\n          <button class=\"preset\" data-preset=\"solida\">Carteira sólida<\u002Fbutton>\n          <button class=\"preset\" data-preset=\"atencao\">Pontos de atenção<\u002Fbutton>\n          <button class=\"preset\" data-preset=\"critica\">Atenção crítica<\u002Fbutton>\n        <\u002Fdiv>\n        <p class=\"sim-note\">Os pesos e faixas são ilustrativos, para demonstrar o raciocínio do RDS Score. A composição real é calibrada para cada empresa no diagnóstico.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- DIMENSIONS -->\n<section class=\"sec\" id=\"dimensoes\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"l\">\n        <span class=\"idx\">03 — O QUE O SCORE MEDE<\u002Fspan>\n        <h2>Cinco frentes, uma leitura única.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"r\">Cada dimensão é avaliada com método próprio e ponderada conforme o peso que tem no resultado da empresa. Juntas, descrevem a saúde da carteira.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dims\">\n      <div class=\"dim rv\">\n        <span class=\"n\">01<\u002Fspan>\n        <h3>Resultado e margem<\u002Fh3>\n        <p>Quanto cada contrato contribui — ou drena — da margem. Identifica deficitários antes do balanço consolidado.<\u002Fp>\n        <span class=\"wt\">Peso<b>30%<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"dim rv\">\n        <span class=\"n\">02<\u002Fspan>\n        <h3>Risco contratual<\u002Fh3>\n        <p>Cláusulas, garantias, sanções e exposição jurídica. Mede o quanto a empresa está protegida — ou descoberta.<\u002Fp>\n        <span class=\"wt\">Peso<b>25%<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"dim rv\">\n        <span class=\"n\">03<\u002Fspan>\n        <h3>Prazo e execução<\u002Fh3>\n        <p>Aderência ao cronograma, aditivos e histórico de atrasos. Revela onde a execução corrói a previsibilidade.<\u002Fp>\n        <span class=\"wt\">Peso<b>20%<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"dim rv\">\n        <span class=\"n\">04<\u002Fspan>\n        <h3>Conformidade<\u002Fh3>\n        <p>Aderência às exigências dos órgãos e às obrigações contratuais. Onde há risco de glosa, penalidade ou questionamento.<\u002Fp>\n        <span class=\"wt\">Peso<b>15%<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"dim rv\">\n        <span class=\"n\">05<\u002Fspan>\n        <h3>Concentração e dependência<\u002Fh3>\n        <p>O quanto o resultado depende de poucos contratos, clientes ou órgãos. Concentração amplifica todos os riscos.<\u002Fp>\n        <span class=\"wt\">Peso<b>10%<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SERVICES -->\n<section class=\"sec\" id=\"servicos\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"l\">\n        <span class=\"idx\">04 — SERVIÇOS<\u002Fspan>\n        <h2>Da leitura da carteira à entrega.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"r\">Cinco frentes para proteger e potencializar a carteira contratual de empresas de infraestrutura.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"svc-grid\">\n      <div class=\"svc rv\"><span class=\"n\">01<\u002Fspan><div><h3>Diagnóstico de carteira<\u002Fh3><p>Metodologia exclusiva RDS aplicada aos seus contratos, com o RDS Score de saúde da carteira.<\u002Fp><span class=\"tag\">Ponto de partida<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"svc rv\"><span class=\"n\">02<\u002Fspan><div><h3>Monitoramento contínuo<\u002Fh3><p>Releitura periódica da carteira, com alertas de risco e identificação dos contratos críticos.<\u002Fp><span class=\"tag\">Recorrente<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"svc rv\"><span class=\"n\">03<\u002Fspan><div><h3>Consultoria estratégica<\u002Fh3><p>Olhar externo e independente sobre portfólio, risco e a entrada em novos contratos e mercados.<\u002Fp><span class=\"tag\">Sob demanda<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"svc rv\"><span class=\"n\">04<\u002Fspan><div><h3>Gerenciamento de projetos<\u002Fh3><p>Coordenação técnica para conduzir projetos do planejamento à entrega, com previsibilidade.<\u002Fp><span class=\"tag\">Execução<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"svc rv\"><span class=\"n\">05<\u002Fspan><div><h3>Hub de especialistas<\u002Fh3><p>Articulação com escritórios e empresas especializadas para cada necessidade técnica e jurídica.<\u002Fp><span class=\"tag\">Rede<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- METHOD -->\n<section class=\"sec\" id=\"metodo\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"l\">\n        <span class=\"idx\">05 — MÉTODO<\u002Fspan>\n        <h2>Do diagnóstico ao acompanhamento.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"r\">Um percurso claro, em quatro etapas, do mapeamento da carteira ao apoio contínuo às decisões.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"steps\">\n      <div class=\"step rv\"><div class=\"sn\">Etapa 01<\u002Fdiv><h3>Diagnóstico<\u002Fh3><p>Mapeamos e classificamos toda a carteira pela metodologia RDS.<\u002Fp><\u002Fdiv>\n      <div class=\"step rv d1\"><div class=\"sn\">Etapa 02<\u002Fdiv><h3>Análise<\u002Fh3><p>Identificamos contratos críticos, riscos e gargalos, com visão independente.<\u002Fp><\u002Fdiv>\n      <div class=\"step rv d2\"><div class=\"sn\">Etapa 03<\u002Fdiv><h3>Relatório<\u002Fh3><p>Entregamos um relatório executivo que sustenta decisões e prestação de contas.<\u002Fp><\u002Fdiv>\n      <div class=\"step rv d3\"><div class=\"sn\">Etapa 04<\u002Fdiv><h3>Acompanhamento<\u002Fh3><p>Monitoramos a evolução da carteira e apoiamos as decisões ao longo do tempo.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CONTACT -->\n<section class=\"contact\" id=\"contato\">\n  <div class=\"wrap\">\n    <span class=\"idx\" style=\"display:block;margin-bottom:40px;\">06 — CONTATO<\u002Fspan>\n    <div class=\"contact-grid\">\n      <div>\n        <h2>Descubra o RDS Score da sua carteira.<\u002Fh2>\n        <p class=\"lead\">Fale com a RDS e comece por um diagnóstico da saúde da sua carteira contratual.<\u002Fp>\n        <div class=\"contact-actions\">\n          <a class=\"primary\" href=\"https://wa.me/5562999063430\" target=\"_blank\" rel=\"noopener\">WhatsApp · (62) 99906-3430<\u002Fa>\n          <a class=\"ghost\" href=\"mailto:atendimento@rdsengenhariaeconsultoria.com.br\">E-mail →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cdata\">\n        <div class=\"ci\"><span class=\"k\">Atendimento<\u002Fspan><span class=\"v\">Goiânia / GO · Brasil<\u002Fspan><\u002Fdiv>\n        <div class=\"ci\"><span class=\"k\">Telefone<\u002Fspan><span class=\"v\">(62) 99906-3430<\u002Fspan><\u002Fdiv>\n        <div class=\"ci\"><span class=\"k\">E-mail<\u002Fspan><span class=\"v sm\">atendimento@rdsengenhariaeconsultoria.com.br<\u002Fspan><\u002Fdiv>\n        <div class=\"ci\"><span class=\"k\">Site<\u002Fspan><span class=\"v sm\">rdsengenhariaeconsultoria.com.br<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"wrap\">\n    <div class=\"foot\">\n      <img class=\"logo\" src=\"5d3138a9-9348-4085-b5f2-1795772464ee\" alt=\"RDS — Engenharia e Consultoria\">\n      <div class=\"links\">\n        <a href=\"#score\">O Score<\u002Fa>\n        <a href=\"#dimensoes\">Dimensões<\u002Fa>\n        <a href=\"#servicos\">Serviços<\u002Fa>\n        <a href=\"#metodo\">Método<\u002Fa>\n        <a href=\"#contato\">Contato<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-bottom\">\n      <span class=\"mono\">© 2026 RDS — Engenharia e Consultoria<\u002Fspan>\n      <span class=\"mono\">Engenharia · Consultoria · Gestão de contratos<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- MODEL SWITCHER -->\n<div class=\"switcher\">\n  <a href=\"index.html\">Modelo 1<\u002Fa>\n  <a href=\"modelo-2.html\">Modelo 2<\u002Fa>\n  <a class=\"active\" href=\"modelo-3.html\">Modelo 3<\u002Fa>\n<\u002Fdiv>\n\n<script>\n  // mobile menu\n  const burger = document.getElementById('burger');\n  const menu = document.getElementById('mobileMenu');\n  burger.addEventListener('click', () => {\n    const open = menu.classList.toggle('open');\n    document.body.style.overflow = open ? 'hidden' : '';\n  });\n  menu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {\n    menu.classList.remove('open'); document.body.style.overflow='';\n  }));\n\n  // ===== RDS SCORE SIMULATOR =====\n  const weights = { d1:.30, d2:.25, d3:.20, d4:.15, d5:.10 };\n  const ids = ['d1','d2','d3','d4','d5'];\n  const arc = document.getElementById('progArc');\n  const C = 2 * Math.PI * 116;            // circumference\n  arc.setAttribute('stroke-dasharray', C.toFixed(1));\n  const scoreNum = document.getElementById('scoreNum');\n  const bandLabel = document.getElementById('bandLabel');\n\n  function bandOf(s){\n    if(s < 4.5) return {t:'Atenção crítica', c:'var(--crit)'};\n    if(s < 7.5) return {t:'Pontos de atenção', c:'var(--bronze-2)'};\n    return {t:'Carteira sólida', c:'var(--good)'};\n  }\n\n  let displayed = 0;          // for count-up\n  let rafId = null;\n  function animateNumber(target){\n    cancelAnimationFrame(rafId);\n    const start = displayed, t0 = performance.now(), dur = 450;\n    function tick(now){\n      const k = Math.min(1, (now - t0)/dur);\n      const e = 1 - Math.pow(1-k, 3);\n      displayed = start + (target - start)*e;\n      scoreNum.textContent = displayed.toFixed(1);\n      if(k < 1) rafId = requestAnimationFrame(tick);\n      else { displayed = target; scoreNum.textContent = target.toFixed(1); }\n    }\n    rafId = requestAnimationFrame(tick);\n  }\n\n  function compute(){\n    let s = 0;\n    ids.forEach(id => {\n      const v = parseFloat(document.getElementById(id).value);\n      s += v * weights[id];\n      // value label + slider fill\n      const lab = document.querySelector('[data-val=\"'+id+'\"]');\n      if(lab) lab.textContent = v.toFixed(1);\n      const el = document.getElementById(id);\n      const pct = (v/10)*100;\n      el.style.background = 'linear-gradient(to right, var(--bronze-2) '+pct+'%, rgba(255,255,255,.18) '+pct+'%)';\n    });\n    s = Math.round(s*10)/10;\n    const b = bandOf(s);\n    arc.style.strokeDashoffset = (C * (1 - s/10)).toFixed(1);\n    arc.style.stroke = b.c;\n    bandLabel.textContent = b.t;\n    bandLabel.style.color = b.c;\n    bandLabel.style.borderColor = b.c;\n    scoreNum.textContent = s.toFixed(1);   // immediate source of truth (count-up is a flourish)\n    animateNumber(s);\n  }\n\n  ids.forEach(id => document.getElementById(id).addEventListener('input', compute));\n\n  const presets = {\n    solida:  {d1:9, d2:8.5, d3:9, d4:9, d5:8},\n    atencao: {d1:6, d2:5.5, d3:6, d4:7, d5:5},\n    critica: {d1:3, d2:2, d3:3.5, d4:5, d5:3}\n  };\n  document.querySelectorAll('.preset').forEach(btn => {\n    btn.addEventListener('click', () => {\n      const p = presets[btn.dataset.preset];\n      ids.forEach(id => document.getElementById(id).value = p[id]);\n      compute();\n    });\n  });\n\n  // init\n  compute();\n\n  // reveal\n  const rvAll = document.querySelectorAll('.rv');\n  if('IntersectionObserver' in window){\n    const io = new IntersectionObserver((entries)=>{\n      entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });\n    }, {rootMargin:'0px 0px -7% 0px'});\n    rvAll.forEach(el=>io.observe(el));\n  }\n  requestAnimationFrame(()=>{\n    const h = window.innerHeight || document.documentElement.clientHeight;\n    rvAll.forEach(el=>{ if(el.getBoundingClientRect().top < h*0.96) el.classList.add('in'); });\n  });\n  setTimeout(()=>document.querySelectorAll('.rv').forEach(el=>el.classList.add('in')), 1200);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
