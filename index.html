  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

h:100%;}\n  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 40px;}\n  section{position:relative;}\n\n  /* kicker */\n  .kicker{\n    display:inline-flex;align-items:center;gap:11px;\n    font-size:12px;letter-spacing:.28em;text-transform:uppercase;font-weight:700;\n    color:var(--bronze);\n  }\n  .kicker::before{content:\"\";width:26px;height:1px;background:var(--bronze);display:inline-block;}\n  .dark .kicker{color:var(--bronze-2);}\n\n  h1,h2,h3{font-weight:500;letter-spacing:-.02em;line-height:1.04;color:var(--ink);}\n  .dark h1,.dark h2,.dark h3{color:#fff;}\n  p{color:var(--muted);}\n  .dark p{color:var(--on-dark-mute);}\n  strong{font-weight:600;color:var(--ink);}\n  .dark strong{color:#fff;}\n\n  .btn{\n    display:inline-flex;align-items:center;gap:10px;justify-content:center;\n    font-size:14px;font-weight:600;letter-spacing:.01em;\n    padding:15px 26px;border-radius:2px;cursor:pointer;border:1px solid transparent;\n    transition:all .35s var(--ease);white-space:nowrap;\n  }\n  .btn .ar{transition:transform .35s var(--ease);}\n  .btn:hover .ar{transform:translateX(4px);}\n  .btn-primary{background:var(--bronze);color:#fff;}\n  .btn-primary:hover{background:var(--bronze-2);}\n  .btn-ghost{background:transparent;color:#fff;border-color:rgba(255,255,255,.28);}\n  .btn-ghost:hover{border-color:#fff;background:rgba(255,255,255,.06);}\n  .btn-dark{background:var(--navy);color:#fff;}\n  .btn-dark:hover{background:var(--navy-2);}\n  .btn-outline-dark{background:transparent;color:var(--navy);border-color:var(--line);}\n  .btn-outline-dark:hover{border-color:var(--navy);}\n\n  /* ============ HEADER ============ */\n  header{\n    position:fixed;top:0;left:0;right:0;z-index:100;\n    transition:background .4s var(--ease),box-shadow .4s var(--ease),border-color .4s var(--ease);\n    border-bottom:1px solid transparent;\n  }\n  header.solid{background:rgba(15,27,48,.86);backdrop-filter:blur(14px);border-bottom-color:var(--line-dark);}\n  .nav{display:flex;align-items:center;justify-content:space-between;height:82px;}\n  .nav .logo{height:30px;width:auto;}\n  .nav-links{display:flex;align-items:center;gap:34px;}\n  .nav-links a{font-size:13.5px;font-weight:500;color:var(--on-dark);opacity:.82;letter-spacing:.01em;transition:opacity .25s,color .25s;position:relative;padding:6px 0;white-space:nowrap;}\n  .nav-links a:hover{opacity:1;color:#fff;}\n  .nav-links a::after{content:\"\";position:absolute;left:0;bottom:0;height:1px;width:0;background:var(--bronze-2);transition:width .3s var(--ease);}\n  .nav-links a:hover::after{width:100%;}\n  .nav-right{display:flex;align-items:center;gap:18px;}\n  .nav-cta{font-size:13px;font-weight:600;color:#fff;border:1px solid rgba(255,255,255,.3);padding:11px 20px;border-radius:2px;transition:all .3s var(--ease);}\n  .nav-cta:hover{background:var(--bronze);border-color:var(--bronze);}\n  .burger{display:none;flex-direction:column;gap:5px;width:30px;height:30px;justify-content:center;cursor:pointer;background:none;border:none;}\n  .burger span{height:1.5px;background:#fff;width:22px;transition:.3s var(--ease);}\n\n  /* mobile menu */\n  .mobile-menu{position:fixed;inset:0;z-index:99;background:var(--navy-3);\n    display:flex;flex-direction:column;justify-content:center;gap:6px;padding:40px;\n    transform:translateY(-100%);transition:transform .5s var(--ease);}\n  .mobile-menu.open{transform:translateY(0);}\n  .mobile-menu a{font-size:30px;font-weight:500;color:#fff;letter-spacing:-.02em;padding:12px 0;border-bottom:1px solid var(--line-dark);}\n  .mobile-menu a:last-of-type{border:none;}\n\n  /* ============ HERO ============ */\n  .hero{background:var(--navy-2);overflow:hidden;min-height:100vh;display:flex;flex-direction:column;}\n  .hero-road{position:absolute;inset:0;z-index:0;}\n  .hero-road img{position:absolute;right:-6%;bottom:-4%;width:74%;min-width:740px;opacity:.92;\n    mask-image:linear-gradient(to left,#000 55%,transparent 100%);\n    -webkit-mask-image:linear-gradient(to left,#000 55%,transparent 100%);}\n  .hero::before{content:\"\";position:absolute;inset:0;z-index:1;pointer-events:none;\n    background:\n      radial-gradient(120% 90% at 12% 8%, rgba(36,56,96,.55) 0%, transparent 55%),\n      linear-gradient(180deg, rgba(10,20,38,.30) 0%, rgba(10,20,38,.0) 30%, rgba(10,20,38,.55) 100%);}\n  .hero-inner{position:relative;z-index:2;flex:1;display:flex;align-items:center;padding-top:82px;}\n  .hero-content{max-width:880px;padding:60px 0;}\n  .hero h1{font-size:clamp(2.7rem,6.2vw,5.4rem);color:#fff;margin:26px 0 0;font-weight:500;letter-spacing:-.028em;max-width:16ch;}\n  .hero h1 em{font-style:normal;color:var(--bronze-2);}\n  .hero .lead{font-size:clamp(1.05rem,1.5vw,1.32rem);color:var(--on-dark-mute);margin-top:28px;max-width:60ch;line-height:1.62;font-weight:400;}\n  .hero-cta{display:flex;gap:16px;margin-top:40px;flex-wrap:wrap;}\n  .hero-meta{position:relative;z-index:2;border-top:1px solid var(--line-dark);}\n  .hero-meta .wrap{display:flex;flex-wrap:wrap;gap:14px 48px;padding-top:26px;padding-bottom:30px;}\n  .hero-meta .mi{display:flex;flex-direction:column;gap:3px;}\n  .hero-meta .mi .v{font-size:15px;color:#fff;font-weight:600;letter-spacing:.005em;}\n  .hero-meta .mi .l{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--on-dark-mute);font-weight:600;}\n\n  /* ============ SECTION SHELLS ============ */\n  .sec{padding:120px 0;}\n  .sec-sm{padding:84px 0;}\n  .dark{background:var(--navy);}\n  .dark.deep{background:var(--navy-3);}\n  .tint{background:var(--paper-2);}\n  .sec-head{max-width:760px;}\n  .sec-head h2{font-size:clamp(2rem,4vw,3.3rem);margin-top:22px;font-weight:500;}\n  .sec-head p{font-size:1.08rem;margin-top:20px;line-height:1.66;}\n\n  /* statement */\n  .statement .big{font-size:clamp(1.9rem,3.7vw,3.1rem);font-weight:500;letter-spacing:-.024em;line-height:1.12;max-width:18ch;}\n  .statement .big b{color:var(--bronze);font-weight:500;}\n  .statement-grid{display:grid;grid-template-columns:1.3fr .9fr;gap:64px;align-items:end;}\n  .statement-grid .side p{font-size:1.06rem;line-height:1.7;}\n  .statement-grid .side .btn{margin-top:26px;}\n\n  /* trusted strip */\n  .trusted{padding:60px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--paper);}\n  .trusted .lab{text-align:center;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);font-weight:600;}\n  .trusted .row{display:flex;align-items:center;justify-content:center;gap:clamp(28px,5vw,64px);margin-top:34px;flex-wrap:wrap;}\n  .trusted .row img{height:34px;width:auto;opacity:.62;filter:grayscale(1);transition:opacity .3s,filter .3s;}\n  .trusted .row img.s-dnit{height:22px;}\n  .trusted .row img:hover{opacity:1;filter:grayscale(0);}\n\n  /* challenge list */\n  .chal-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:72px;align-items:start;}\n  .chal-list{display:flex;flex-direction:column;}\n  .chal-item{display:flex;gap:22px;padding:24px 0;border-top:1px solid var(--line-dark);align-items:baseline;}\n  .chal-item:last-child{border-bottom:1px solid var(--line-dark);}\n  .chal-item .n{font-size:13px;font-weight:700;color:var(--bronze-2);font-variant-numeric:tabular-nums;min-width:28px;letter-spacing:.04em;}\n  .chal-item .t{font-size:1.12rem;color:var(--on-dark);font-weight:400;line-height:1.4;}\n  .chal-aside{position:sticky;top:120px;}\n  .chal-aside .pull{font-size:1.4rem;line-height:1.4;color:#fff;font-weight:500;letter-spacing:-.01em;}\n  .chal-aside .pull b{color:var(--bronze-2);font-weight:500;}\n  .chal-aside .rule{height:1px;background:var(--line-dark);margin:30px 0;}\n\n  /* services grid */\n  .svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-top:60px;}\n  .svc{background:var(--paper);padding:42px 36px 46px;display:flex;flex-direction:column;min-height:300px;transition:background .35s var(--ease);position:relative;}\n  .svc:hover{background:var(--paper-2);}\n  .svc .n{font-size:13px;font-weight:700;color:var(--bronze);letter-spacing:.1em;font-variant-numeric:tabular-nums;}\n  .svc h3{font-size:1.4rem;margin-top:26px;font-weight:500;letter-spacing:-.012em;line-height:1.16;}\n  .svc p{margin-top:14px;font-size:1rem;line-height:1.62;flex:1;}\n  .svc .tag{margin-top:22px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--bronze);font-weight:600;opacity:0;transform:translateX(-6px);transition:.35s var(--ease);}\n  .svc:hover .tag{opacity:1;transform:translateX(0);}\n\n  /* method steps */\n  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:64px;}\n  .step{padding:0 30px;position:relative;}\n  .step:first-child{padding-left:0;}\n  .step::before{content:\"\";position:absolute;top:14px;left:0;right:30px;height:1px;background:var(--line-dark);}\n  .step:first-child::before{left:0;}\n  .step .dot{width:11px;height:11px;border-radius:50%;background:var(--bronze);position:relative;z-index:2;margin-bottom:30px;box-shadow:0 0 0 6px var(--navy);}\n  .step .sn{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--bronze-2);font-weight:700;}\n  .step h3{font-size:1.5rem;margin-top:12px;color:#fff;font-weight:500;}\n  .step p{margin-top:14px;font-size:.98rem;line-height:1.6;}\n\n  /* founder */\n  .founder-grid{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center;}\n  .founder-copy h2{font-size:clamp(1.9rem,3.4vw,2.9rem);margin-top:22px;font-weight:500;}\n  .founder-copy .body{margin-top:26px;display:flex;flex-direction:column;gap:18px;}\n  .founder-copy .body p{font-size:1.06rem;line-height:1.72;}\n  .credrow{display:flex;align-items:center;gap:26px;margin-top:34px;flex-wrap:wrap;}\n  .credrow img{height:30px;width:auto;opacity:.7;filter:grayscale(1);}\n  .credrow img.s-dnit{height:19px;}\n  .credrow .sep{width:1px;height:30px;background:var(--line);}\n  .portrait{position:relative;aspect-ratio:4/5;border-radius:3px;overflow:hidden;\n    background:\n      repeating-linear-gradient(135deg, #e7eaf1 0 2px, transparent 2px 13px), var(--paper-2);\n    border:1px solid var(--line);display:flex;align-items:flex-end;}\n  .portrait .ph{font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.05em;color:#9aa3b4;\n    background:rgba(255,255,255,.85);padding:8px 12px;margin:16px;border-radius:2px;}\n  .stat-band{display:flex;gap:54px;margin-top:46px;padding-top:36px;border-top:1px solid var(--line);}\n  .stat-band .fig{font-size:3.4rem;font-weight:300;line-height:.9;color:var(--bronze);letter-spacing:-.03em;font-variant-numeric:tabular-nums;}\n  .stat-band .cap{font-size:.95rem;color:var(--muted);margin-top:10px;line-height:1.5;max-width:22ch;}\n  /* feature card (replaces portrait) */\n  .feature{position:relative;border-radius:3px;overflow:hidden;background:var(--navy);min-height:380px;display:flex;border:1px solid rgba(20,35,63,.12);}\n  .feature-bg{position:absolute;inset:0;background:linear-gradient(158deg,#1b2c4d 0%,#0e1a30 100%);}\n  .feature-bg::after{content:\"\";position:absolute;inset:0;background:url(\"af50d739-7a44-42f3-9e7c-3ebb22d26441\") right 80%/150% auto no-repeat;opacity:.30;\n    -webkit-mask-image:linear-gradient(to top,#000 8%,transparent 72%);mask-image:linear-gradient(to top,#000 8%,transparent 72%);}\n  .feature-inner{position:relative;z-index:2;padding:46px 44px;display:flex;flex-direction:column;width:100%;}\n  .feature .fq{font-size:1.55rem;line-height:1.34;color:#fff;font-weight:400;letter-spacing:-.014em;margin-top:auto;max-width:26ch;}\n  .feature .finst{margin-top:30px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--bronze-2);font-weight:600;}\n\n  /* CTA */\n  .cta{background:var(--navy-3);overflow:hidden;}\n  .cta-road{position:absolute;inset:0;z-index:0;opacity:.4;}\n  .cta-road img{position:absolute;right:0;bottom:0;width:60%;min-width:600px;\n    mask-image:linear-gradient(to left,#000 40%,transparent 90%);-webkit-mask-image:linear-gradient(to left,#000 40%,transparent 90%);}\n  .cta .wrap{position:relative;z-index:2;}\n  .cta-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:64px;align-items:center;}\n  .cta h2{font-size:clamp(2rem,4vw,3.2rem);font-weight:500;max-width:16ch;}\n  .cta .lead{font-size:1.1rem;color:var(--on-dark-mute);margin-top:22px;line-height:1.6;max-width:46ch;}\n  .cta-actions{display:flex;gap:16px;margin-top:36px;flex-wrap:wrap;}\n  .contact-card{background:rgba(255,255,255,.04);border:1px solid var(--line-dark);border-radius:4px;padding:38px;}\n  .contact-card .ci{padding:16px 0;border-bottom:1px solid var(--line-dark);}\n  .contact-card .ci:first-child{padding-top:0;}\n  .contact-card .ci:last-child{border:none;padding-bottom:0;}\n  .contact-card .l{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--bronze-2);font-weight:600;}\n  .contact-card .v{font-size:1.05rem;color:#fff;margin-top:6px;font-weight:500;}\n  .contact-card .v.sm{font-size:.95rem;}\n\n  /* footer */\n  footer{background:var(--navy-3);border-top:1px solid var(--line-dark);padding:74px 0 40px;}\n  .foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:48px;}\n  .foot-brand .logo{height:32px;margin-bottom:22px;}\n  .foot-brand p{font-size:.95rem;color:var(--on-dark-mute);max-width:32ch;line-height:1.6;}\n  .foot-col h4{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--bronze-2);font-weight:700;margin-bottom:20px;}\n  .foot-col a{display:block;font-size:.96rem;color:var(--on-dark-mute);padding:7px 0;transition:color .25s;}\n  .foot-col a:hover{color:#fff;}\n  .foot-bottom{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;\n    margin-top:60px;padding-top:30px;border-top:1px solid var(--line-dark);}\n  .foot-bottom p{font-size:13px;color:var(--on-dark-mute);}\n  .foot-bottom .creg{font-size:12px;letter-spacing:.06em;color:var(--steel);}\n\n  /* reveal animation */\n  .rv{opacity:0;transform:translateY(26px);transition:opacity .9s var(--ease),transform .9s var(--ease);}\n  .rv.in{opacity:1;transform:none;}\n  .rv.d1{transition-delay:.08s;} .rv.d2{transition-delay:.16s;} .rv.d3{transition-delay:.24s;} .rv.d4{transition-delay:.32s;}\n  @media (prefers-reduced-motion:reduce){.rv{opacity:1;transform:none;transition:none;}html{scroll-behavior:auto;}}\n\n  /* ============ RESPONSIVE ============ */\n  @media (max-width:1080px){\n    .wrap{padding:0 30px;}\n    .svc-grid{grid-template-columns:repeat(2,1fr);}\n    .steps{grid-template-columns:repeat(2,1fr);gap:48px 0;}\n    .step::before{display:none;}\n  }\n  @media (max-width:860px){\n    .nav-links,.nav-cta{display:none;}\n    .burger{display:flex;}\n    .sec{padding:84px 0;}\n    .statement-grid,.chal-grid,.founder-grid,.cta-grid{grid-template-columns:1fr;gap:44px;}\n    .chal-aside{position:static;}\n    .foot-grid{grid-template-columns:1fr 1fr;gap:40px;}\n    .foot-brand{grid-column:1/-1;}\n    .hero h1{font-size:clamp(2.4rem,9vw,3.4rem);}\n    .hero-road img{width:120%;min-width:0;right:-30%;opacity:.5;}\n  }\n  @media (max-width:540px){\n    .wrap{padding:0 22px;}\n    .svc-grid{grid-template-columns:1fr;}\n    .steps{grid-template-columns:1fr;}\n    .stat-band{flex-direction:column;gap:28px;}\n    .foot-grid{grid-template-columns:1fr;}\n    .hero-cta .btn{flex:1;}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n<!-- ===================== HEADER ===================== -->\n<header id=\"hdr\">\n  <div class=\"wrap nav\">\n    <a href=\"#top\" aria-label=\"RDS\"><img class=\"logo\" src=\"c89b0c0a-6074-49e8-91dd-eb484ba8abba\" alt=\"RDS — Engenharia e Consultoria\"><\u002Fa>\n    <nav class=\"nav-links\">\n      <a href=\"#desafio\">O desafio<\u002Fa>\n      <a href=\"#servicos\">Serviços<\u002Fa>\n      <a href=\"#metodo\">Método<\u002Fa>\n      <a href=\"#fundador\">Quem somos<\u002Fa>\n      <a href=\"#contato\">Contato<\u002Fa>\n    <\u002Fnav>\n    <div class=\"nav-right\">\n      <a class=\"nav-cta\" href=\"#contato\">Falar com a RDS<\u002Fa>\n      <button class=\"burger\" id=\"burger\" aria-label=\"Menu\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"mobile-menu\" id=\"mobileMenu\">\n  <a href=\"#desafio\">O desafio<\u002Fa>\n  <a href=\"#servicos\">Serviços<\u002Fa>\n  <a href=\"#metodo\">Método<\u002Fa>\n  <a href=\"#fundador\">Quem somos<\u002Fa>\n  <a href=\"#contato\">Contato<\u002Fa>\n<\u002Fdiv>\n\n<!-- ===================== HERO ===================== -->\n<section class=\"hero\" id=\"top\">\n  <div class=\"hero-road\"><img src=\"af50d739-7a44-42f3-9e7c-3ebb22d26441\" alt=\"\"><\u002Fdiv>\n  <div class=\"hero-inner\">\n    <div class=\"wrap\">\n      <div class=\"hero-content\">\n        <span class=\"kicker rv\">Diagnóstico e gestão de carteira contratual<\u002Fspan>\n        <h1 class=\"rv d1\">A visão externa de quem conhece a infraestrutura <em>por dentro.<\u002Fem><\u002Fh1>\n        <p class=\"lead rv d2\">Diagnóstico, monitoramento e consultoria estratégica da carteira contratual de empresas de infraestrutura — com a autoridade de décadas na alta gestão do setor.<\u002Fp>\n        <div class=\"hero-cta rv d3\">\n          <a class=\"btn btn-primary\" href=\"#contato\">Agende um diagnóstico <span class=\"ar\">→<\u002Fspan><\u002Fa>\n          <a class=\"btn btn-ghost\" href=\"#servicos\">Conheça os serviços<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== STATEMENT ===================== -->\n<section class=\"sec statement\">\n  <div class=\"wrap statement-grid\">\n    <div class=\"main\">\n      <span class=\"kicker rv\">A leitura que falta<\u002Fspan>\n      <h2 class=\"big rv d1\" style=\"margin-top:22px;\">Sua carteira de contratos decide a sua margem — <b>muito antes<\u002Fb> de aparecer no balanço.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"side rv d2\">\n      <p>Carteiras grandes e complexas raramente são rel
